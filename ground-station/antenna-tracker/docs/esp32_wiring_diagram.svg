<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">

  <style>
    .board { fill:#1f2937; stroke:#111827; stroke-width:3 }
    .pin { fill:#374151; stroke:#111827; stroke-width:1 }
    .text { fill:white; font-family:monospace; font-size:14px }
    .title { fill:#111827; font-family:Arial; font-size:22px; font-weight:bold }
    .wireA { stroke:#3b82f6; stroke-width:3 }
    .wireB { stroke:#10b981; stroke-width:3 }
  </style>

  <text x="300" y="40" class="title">ESP32 DevKit V1 → Dual 28BYJ-48 Wiring</text>

  <!-- ESP32 Board -->
  <rect x="200" y="80" width="600" height="450" rx="20" class="board"/>
  <text x="430" y="110" class="text">ESP32 DevKit V1 (USB at Top)</text>

  <!-- Left Pins -->
  <text x="220" y="160" class="text">GPIO14 (Az IN1)</text>
  <text x="220" y="190" class="text">GPIO27 (Az IN2)</text>
  <text x="220" y="220" class="text">GPIO26 (Az IN3)</text>
  <text x="220" y="250" class="text">GPIO25 (Az IN4)</text>
  <text x="220" y="300" class="text">GPIO33 (El IN1)</text>
  <text x="220" y="330" class="text">GPIO32 (El IN2)</text>

  <!-- Right Pins -->
  <text x="560" y="300" class="text">GPIO18 (El IN3)</text>
  <text x="560" y="330" class="text">GPIO19 (El IN4)</text>

  <!-- Azimuth Driver Box -->
  <rect x="50" y="150" width="120" height="150" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
  <text x="60" y="140" fill="#1e3a8a" font-family="Arial" font-size="14">SBT0811 #1</text>
  <text x="60" y="170" fill="#1e3a8a" font-size="12">IN1</text>
  <text x="60" y="190" fill="#1e3a8a" font-size="12">IN2</text>
  <text x="60" y="210" fill="#1e3a8a" font-size="12">IN3</text>
  <text x="60" y="230" fill="#1e3a8a" font-size="12">IN4</text>

  <!-- Elevation Driver Box -->
  <rect x="830" y="260" width="120" height="150" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="3"/>
  <text x="840" y="250" fill="#065f46" font-family="Arial" font-size="14">SBT0811 #2</text>
  <text x="840" y="280" fill="#065f46" font-size="12">IN1</text>
  <text x="840" y="300" fill="#065f46" font-size="12">IN2</text>
  <text x="840" y="320" fill="#065f46" font-size="12">IN3</text>
  <text x="840" y="340" fill="#065f46" font-size="12">IN4</text>

  <!-- Wires Azimuth -->
  <line x1="200" y1="155" x2="170" y2="170" class="wireA"/>
  <line x1="200" y1="185" x2="170" y2="190" class="wireA"/>
  <line x1="200" y1="215" x2="170" y2="210" class="wireA"/>
  <line x1="200" y1="245" x2="170" y2="230" class="wireA"/>

  <!-- Wires Elevation -->
  <line x1="800" y1="285" x2="830" y2="280" class="wireB"/>
  <line x1="800" y1="315" x2="830" y2="300" class="wireB"/>
  <line x1="800" y1="345" x2="830" y2="320" class="wireB"/>
  <line x1="800" y1="375" x2="830" y2="340" class="wireB"/>

</svg>
