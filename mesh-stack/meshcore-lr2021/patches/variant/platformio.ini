; NiceRF LoRa2021 (LR2021 Gen 4) + ESP32-C3_Mini_V1
; Sub-GHz LoRa only (868 MHz band)
; Pin mapping matches AGENTS.md wiring

[NiceRF_LR2021]
extends = esp32_base
board = seeed_xiao_esp32c3
build_flags =
  ${esp32_base.build_flags}
  -I variants/nicerf_lr2021
  -D ESP32_CPU_FREQ=80
  -D PIN_VBAT_READ=D0
  -D P_LORA_SCLK=D6
  -D P_LORA_MISO=D2
  -D P_LORA_MOSI=D7
  -D P_LORA_DIO_1=D5
  -D P_LORA_NSS=D10
  -D P_LORA_RESET=D3
  -D P_LORA_BUSY=D4
  -D USE_LR2021
  -D RADIO_CLASS=CustomLR2021
  -D WRAPPER_CLASS=CustomLR2021Wrapper
  -D LORA_TX_POWER=22
  ; Exclude SX126x (not used), keep LR2021 enabled
  -D RADIOLIB_EXCLUDE_SX126X=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/nicerf_lr2021>
  +<helpers/sensors>
lib_deps =
  ${esp32_base.lib_deps}

[env:LR2021_companion_radio_usb]
extends = NiceRF_LR2021
build_src_filter = ${NiceRF_LR2021.build_src_filter}
  +<../examples/companion_radio/*.cpp>
  +<helpers/esp32/*.cpp>
build_flags =
  ${NiceRF_LR2021.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
lib_deps =
  ${NiceRF_LR2021.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:LR2021_companion_radio_ble]
extends = NiceRF_LR2021
build_src_filter = ${NiceRF_LR2021.build_src_filter}
  +<../examples/companion_radio/*.cpp>
  +<helpers/esp32/*.cpp>
build_flags =
  ${NiceRF_LR2021.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  -D BLE_PIN_CODE=123456
lib_deps =
  ${NiceRF_LR2021.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:LR2021_companion_radio_wifi]
extends = NiceRF_LR2021
build_src_filter = ${NiceRF_LR2021.build_src_filter}
  +<../examples/companion_radio/*.cpp>
  +<helpers/esp32/*.cpp>
build_flags =
  ${NiceRF_LR2021.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  -D WIFI_DEBUG_LOGGING=1
  -D WIFI_SSID='"myssid"'
  -D WIFI_PWD='"mypwd"'
lib_deps =
  ${NiceRF_LR2021.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:LR2021_repeater]
extends = NiceRF_LR2021
build_src_filter = ${NiceRF_LR2021.build_src_filter}
  +<../examples/simple_repeater/*.cpp>
build_flags =
  ${NiceRF_LR2021.build_flags}
  ${sensor_base.build_flags}
  -UENV_INCLUDE_GPS
  -UENV_INCLUDE_VL53L0X
  -D ADVERT_NAME='"LR2021 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
lib_deps =
  ${NiceRF_LR2021.lib_deps}
  ${sensor_base.lib_deps}
  ${esp32_ota.lib_deps}
  bakercp/CRC32 @ ^2.0.0

