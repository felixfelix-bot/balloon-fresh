; FLRC Throughput Benchmark for NiceRF LR2021 + ESP32-C3 SuperMini
;
; 13 build environments:
;   bench                          — Serial-command benchmarker (Phase 3+)
;   flrc_tx / flrc_rx              — FLRC 868 MHz @ 325 kbps
;   flrc_tx_650 / flrc_rx_650      — FLRC 868 MHz @ 650 kbps
;   flrc_tx_24 / flrc_rx_24        — FLRC 2.4 GHz @ 1300 kbps (FIPS target)
;   flrc_tx_24_max / flrc_rx_24_max— FLRC 2.4 GHz @ 2600 kbps (max throughput)
;   lora_tx / lora_rx              — LoRa 868 MHz SF9/BW125 (tracker baseline)
;   lora_tx_sf8 / lora_rx_sf8      — LoRa 868 MHz SF8/BW62.5 (MeshCore PHY)

[platformio]
default_envs = bench

[env]
platform = espressif32 @ 6.10.0
framework = arduino
board = esp32c3_supermini
board_build.variants_dir = variants
lib_deps =
  jgromes/RadioLib @ 7.6.0
monitor_speed = 115200
monitor_filters = time
upload_speed = 460800
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_USB_SERIAL=1
build_src_filter = +<*> -<bench_main.cpp>

; ---- Serial-command benchmarker (Phase 3+) ----
[env:bench]
build_src_filter = -<main.cpp> +<bench_main.cpp> +<prbs.h> +<config.h> +<EspIdfHal.h>

; ---- FLRC 868 MHz TX ----
[env:flrc_tx]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_TX
  -DFLRC_FREQ=868.0
  -DFLRC_BR=325
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=22
  -DFLRC_PKT_COUNT=1000
  -DFLRC_PKT_SIZE=50

; ---- FLRC 868 MHz RX ----
[env:flrc_rx]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_RX
  -DFLRC_FREQ=868.0
  -DFLRC_BR=325
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=22
  -DFLRC_PKT_SIZE=50

; ---- FLRC 868 MHz @ 650 kbps TX ----
[env:flrc_tx_650]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_TX
  -DFLRC_FREQ=868.0
  -DFLRC_BR=650
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=22
  -DFLRC_PKT_COUNT=1000
  -DFLRC_PKT_SIZE=50

; ---- FLRC 868 MHz @ 650 kbps RX ----
[env:flrc_rx_650]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_RX
  -DFLRC_FREQ=868.0
  -DFLRC_BR=650
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=22
  -DFLRC_PKT_SIZE=50

; ---- FLRC 2.4 GHz TX ----
[env:flrc_tx_24]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_TX
  -DFLRC_FREQ=2450.0
  -DFLRC_BR=1300
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=12
  -DFLRC_PKT_COUNT=1000
  -DFLRC_PKT_SIZE=50

; ---- FLRC 2.4 GHz RX ----
[env:flrc_rx_24]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_RX
  -DFLRC_FREQ=2450.0
  -DFLRC_BR=1300
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=12
  -DFLRC_PKT_SIZE=50

; ---- FLRC 2.4 GHz @ 2600 kbps TX (max throughput) ----
[env:flrc_tx_24_max]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_TX
  -DFLRC_FREQ=2450.0
  -DFLRC_BR=2600
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=12
  -DFLRC_PKT_COUNT=1000
  -DFLRC_PKT_SIZE=50

; ---- FLRC 2.4 GHz @ 2600 kbps RX ----
[env:flrc_rx_24_max]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_RX
  -DFLRC_FREQ=2450.0
  -DFLRC_BR=2600
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=12
  -DFLRC_PKT_SIZE=50

; ---- LoRa 868 MHz SF9/BW125 TX (tracker baseline) ----
[env:lora_tx]
build_flags =
  ${env.build_flags}
  -DLORA_ROLE_TX
  -DLORA_FREQ=868.0
  -DLORA_SF=9
  -DLORA_BW=125.0
  -DLORA_CR=7
  -DLORA_PWR=22
  -DLORA_PKT_COUNT=100
  -DLORA_PKT_SIZE=50

; ---- LoRa 868 MHz SF9/BW125 RX (tracker baseline) ----
[env:lora_rx]
build_flags =
  ${env.build_flags}
  -DLORA_ROLE_RX
  -DLORA_FREQ=868.0
  -DLORA_SF=9
  -DLORA_BW=125.0
  -DLORA_CR=7
  -DLORA_PWR=22
  -DLORA_PKT_SIZE=50

; ---- LoRa 868 MHz SF8/BW62.5 TX (MeshCore PHY) ----
[env:lora_tx_sf8]
build_flags =
  ${env.build_flags}
  -DLORA_ROLE_TX
  -DLORA_FREQ=869.618
  -DLORA_SF=8
  -DLORA_BW=62.5
  -DLORA_CR=5
  -DLORA_PWR=22
  -DLORA_PKT_COUNT=100
  -DLORA_PKT_SIZE=50

; ---- LoRa 868 MHz SF8/BW62.5 RX (MeshCore PHY) ----
[env:lora_rx_sf8]
build_flags =
  ${env.build_flags}
  -DLORA_ROLE_RX
  -DLORA_FREQ=869.618
  -DLORA_SF=8
  -DLORA_BW=62.5
  -DLORA_CR=5
  -DLORA_PWR=22
  -DLORA_PKT_SIZE=50
