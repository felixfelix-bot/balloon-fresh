; FLRC Throughput Benchmark for NiceRF LR2021 + ESP32-C3 SuperMini
;
; Usage:
;   pio run -e flrc_tx              # TX firmware
;   pio run -e flrc_rx              # RX firmware
;   pio run -e flrc_tx -t upload    # flash TX
;   pio run -e flrc_rx -t upload    # flash RX
;   pio run -e lora_tx              # LoRa baseline TX
;   pio run -e lora_rx              # LoRa baseline RX

[platformio]
default_envs = flrc_tx

[env]
platform = espressif32 @ 6.10.0
framework = arduino
board = esp32c3_supermini
board_build.variants_dir = variants
lib_deps =
  jgromes/RadioLib @ ^7.6.0
monitor_speed = 115200
monitor_filters = time
upload_speed = 460800
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_USB_SERIAL=1

; ---- FLRC 868 MHz TX ----
[env:flrc_tx]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_TX
  -DFLRC_FREQ=868.0
  -DFLRC_BR=325
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=22
  -DFLRC_PKT_COUNT=1000
  -DFLRC_PKT_SIZE=50

; ---- FLRC 868 MHz RX ----
[env:flrc_rx]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_RX
  -DFLRC_FREQ=868.0
  -DFLRC_BR=325
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=22
  -DFLRC_PKT_SIZE=50

; ---- FLRC 2.4 GHz TX ----
[env:flrc_tx_24]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_TX
  -DFLRC_FREQ=2450.0
  -DFLRC_BR=1300
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=12
  -DFLRC_PKT_COUNT=1000
  -DFLRC_PKT_SIZE=50

; ---- FLRC 2.4 GHz RX ----
[env:flrc_rx_24]
build_flags =
  ${env.build_flags}
  -DFLRC_ROLE_RX
  -DFLRC_FREQ=2450.0
  -DFLRC_BR=1300
  -DFLRC_CR=RADIOLIB_LR2021_FLRC_CR_3_4
  -DFLRC_PWR=12
  -DFLRC_PKT_SIZE=50

; ---- LoRa 868 MHz SF9/BW125 TX (tracker baseline) ----
[env:lora_tx]
build_flags =
  ${env.build_flags}
  -DLORA_ROLE_TX
  -DLORA_FREQ=868.0
  -DLORA_SF=9
  -DLORA_BW=125.0
  -DLORA_CR=7
  -DLORA_PWR=22
  -DLORA_PKT_COUNT=100
  -DLORA_PKT_SIZE=50

; ---- LoRa 868 MHz SF9/BW125 RX (tracker baseline) ----
[env:lora_rx]
build_flags =
  ${env.build_flags}
  -DLORA_ROLE_RX
  -DLORA_FREQ=868.0
  -DLORA_SF=9
  -DLORA_BW=125.0
  -DLORA_CR=7
  -DLORA_PWR=22
  -DLORA_PKT_SIZE=50
