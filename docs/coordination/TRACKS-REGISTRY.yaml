# Balloon Project — Tracks Registry
#
# Machine-readable registry of all balloon tracks.
# The orchestrator (balloon-hermes) reads this at startup to know:
#   - Which tracks it owns (scope)
#   - How to reach each track (Signal group ID for `hermes send`)
#   - Where each track's worktree is (for reading status files)
#   - Which kanban board each track uses (for querying board state)
#   - What each track depends on (for building the dependency graph)
#
# This file is the SINGLE SOURCE OF TRUTH for orchestrator scope.
# If a track is added/removed, update THIS file.

project: balloon
orchestrator_group: balloon-hermes
orchestrator_signal_id: "DsaZYWqljekDA4/cBK9NLDVrudr7rkqcVhI02Z0/M08="
repo: ~/repos/balloon-fresh/
coordination_dir: docs/coordination/

# Dependency notation:
#   depends_on: list of track names this track needs output from
#   blocks: list of track names that wait on this track
#   "none" = no dependencies, can start immediately

