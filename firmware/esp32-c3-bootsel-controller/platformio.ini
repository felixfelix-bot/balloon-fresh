; ESP32-C3 RP2040 BOOTSEL Controller (FIXED v2)
; Uses native USB JTAG/serial (default for esp32-c3-devkitm-1)
; NO ARDUINO_USB_MODE / CDC_ON_BOOT — those break native serial
[env:esp32-c3-bootsel-controller]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = 
    -DCORE_DEBUG_LEVEL=2
lib_deps =
