; ESP32-C3 RP2040 BOOTSEL Controller
[env:esp32-c3-bootsel-controller]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 921600
build_flags = 
    -DCORE_DEBUG_LEVEL=0
lib_deps =

; One-shot trigger: flashes BOOTSEL once, then idles
[env:esp32-bootsel-oneshot]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 921600
build_src_filter = -<*> +<bootsel_oneshot.cpp>
build_flags = 
    -DCORE_DEBUG_LEVEL=0
lib_deps =
