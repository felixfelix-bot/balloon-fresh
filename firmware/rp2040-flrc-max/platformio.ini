; RP2040 FLRC Maximum Throughput Test
; Target: 2600 kbps air rate, maximize effective throughput
; TX: F242D board, RX: 8332 board

[platformio]
default_envs = rx

[env]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
    jgromes/RadioLib @ ^7.6.0
upload_protocol = picotool
monitor_speed = 115200

; === RX MODE ===
[env:rx]
build_flags =
    ${env.build_flags}
    -D ROLE_RX

; === TX MODE ===
[env:tx]
build_flags =
    ${env.build_flags}
    -D ROLE_TX
