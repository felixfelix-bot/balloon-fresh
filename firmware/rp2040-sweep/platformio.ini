; PlatformIO config for LR2021 multi-mode sweep
; Uses LR2021Raw library — NO RADIOLIB (see ADR-020)
[platformio]
default_envs = tx, rx

[env]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_flags =
  -D SERIAL_BAUD=115200
  -O2
  -Wall

[env:tx]
build_srcfilter = +<*> -<rx_main.cpp> -<chip_diagnostic.cpp>
build_flags =
  ${env.build_flags}
  -DROLE_TX

[env:rx]
build_srcfilter = +<*> -<tx_main.cpp> -<chip_diagnostic.cpp> -<minimal_uart_test.cpp>
build_flags =
  ${env.build_flags}
  -DROLE_RX

[env:diag]
build_srcfilter = -<*> +<chip_diagnostic.cpp>
build_flags =
  ${env.build_flags}

[env:minimal]
build_srcfilter = -<*> +<minimal_uart_test.cpp>
build_flags =
  ${env.build_flags}
