; PlatformIO config for LR2021 multi-mode sweep
; Builds TX and RX firmware from same codebase with -DROLE_TX / -DROLE_RX
[platformio]
default_envs = tx, rx

[env]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
lib_deps =
  jgromes/RadioLib @ ^7.6.0
build_flags =
  -D SERIAL_BAUD=115200
  -O2
  -Wall

[env:tx]
build_srcfilter = +<*> -<rx_main.cpp>
build_flags =
  ${env.build_flags}
  -DROLE_TX

[env:diag]
build_srcfilter = -<*> +<chip_diagnostic.cpp>
build_flags =
  ${env.build_flags}

[env:rx]
build_srcfilter = +<*> -<tx_main.cpp> -<chip_diagnostic.cpp>
build_flags =
  ${env.build_flags}
  -DROLE_RX
