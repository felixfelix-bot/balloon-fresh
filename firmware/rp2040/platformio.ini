lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW RX 20MHz (must match TX SPI clock) ─────────────────────
;   pio run -e rp2040-raw-rx-20mhz
[env:rp2040-raw-rx-20mhz]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_rx_20mhz.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC DMA TX (DMA-based SPI FIFO writes — zero CPU wait) ──────────
;   pio run -e rp2040-dma-tx
;   Uses RP2040 DMA channel to feed spi0 TX FIFO autonomously.
;   DMA transfer chain: CLR_IRQ → WRITE_TX_FIFO(257B) → SET_TX.
;   Expected: ~2400 kbps (up from ~2200 with polling HW SPI)
[env:rp2040-dma-tx]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_dma_tx.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW TX BATCH (batch SPI transfer — spi_write_blocking) ──────
;   pio run -e rp2040-raw-tx-batch
;   Uses SPIClassRP2040::transfer(txbuf, nullptr, count) which calls
;   the Pico SDK spi_write_blocking() for true batch FIFO writes,
;   eliminating per-byte transfer() function call overhead.
;   Same radio config as rp2040-raw-tx (20MHz SPI, 1000 packets).
[env:rp2040-raw-tx-batch]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_tx_batch.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW TX PIPE (pipelined TX — overlap FIFO write with air time) ─
;   pio run -e rp2040-raw-tx-pipe
;   Based on v4 (flrc_raw_tx.cpp) with FIFO pipelining:
;   - PRIME: write pkt[0] + SET_TX before loop
;   - LOOP: poll IRQ → CLR_IRQ+CLR_TX_FIFO+CLEAR_ERRORS (one CS) → WRITE_FIFO(pkt[i+1]) → SET_TX
;   - Combines CLR_IRQ + CLR_TX_FIFO + CLEAR_ERRORS into single CS assertion
;   - Per-packet CLEAR_ERRORS (PA_OCP_OVP accumulates)
;   - Arduino SPI only (NO direct spi0_hw->dr), 16MHz, IRQ pin polling
;   Sends 1000 packets + DEADBEEF end marker
[env:rp2040-raw-tx-pipe]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_tx_pipe.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW TX SWEEP (runtime SPI frequency control) ────────────────
;   pio run -e rp2040-raw-tx-sweep
;   Accepts serial commands to set SPI frequency and run TX bursts:
;     SETSPI <freq_hz>  — set SPI clock, re-init peripheral
;     RUN               — 1000-packet TX burst at current SPI freq
;     INIT              — re-init radio
;     FREQ?             — query current requested/actual SPI freq
;   Default SPI freq: 15.625 MHz (125MHz/8)
[env:rp2040-raw-tx-sweep]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_tx_sweep.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW RX (no RadioLib — raw SPI init with all fixes) ──────────
;   pio run -e rp2040-raw-rx
;   Raw SPI init: SET_RX_PATH, CALIB_FE, CLEAR_ERRORS, correct freq
;   Auto-starts 8s after boot, listens for TX packets
[env:rp2040-raw-rx]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_rx.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC PIO TX (PIO+DMA SPI — replaces Arduino per-byte SPI) ────────
;   pio run -e rp2040-pio-tx
;   Uses PIO state machine + DMA for SPI transfers (20.83MHz SCK).
;   Expected: reduce 535µs SPI overhead → ~103µs → ~1900 kbps.
;   Same radio config as rp2040-raw-tx (preamble=8, 2600kbps, 255B payload).
;   Prints spin count for first 5 packets — smoke test for fake results.
[env:rp2040-pio-tx]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_pio_tx.cpp> +<pio_lr2021_rx.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── SPI Timing Diagnostic (no radio needed — pure SPI timing) ────────
;   pio run -e rp2040-spi-timing-diag
;   Measures per-byte vs split-batch vs single-batch SPI timing.
;   Connect GP14 to scope/LA to see inter-batch SCK gaps.
[env:rp2040-spi-timing-diag]
