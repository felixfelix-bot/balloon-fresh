; PlatformIO project for RP2040 coprocessor firmware (Board B / ADR-015)
;
; Build:    pio run -e rp2040
; Flash:    pio run -e rp2040 -t upload
; Monitor:  pio device monitor -p /dev/ttyACM0 -b 115200
;
; Or via Makefile:
;   make rp2040-build
;   make rp2040-flash

[platformio]
default_envs = rp2040

[env:rp2040]
platform = raspberrypi
board = pico
framework = arduino
build_flags =
    -D RP2040
    -D SERIAL_BAUD=115200
    -D USE_PIO_RX=1
    -O2
    -Wall
lib_deps = jgromes/RadioLib @ ^7.6.0
upload_protocol = picotool
monitor_speed = 115200

; ── UART Echo Test (verify GP12/GP13 UART bridge) ───────────────────
;   pio run -e rp2040-uart-test
;   Copy UF2 to RPI-RP2
[env:rp2040-uart-test]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<main.cpp> -<radio.cpp> -<flrc_rx_main.cpp> -<pico_sdk_main.cpp> -<pio_lr2021_rx.cpp> +<uart_echo.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC Speed RX (RadioLib init + raw SPI hot loop) ────────────────
;   pio run -e rp2040-flrc-rx
;   pio run -e rp2040-flrc-rx -t upload --upload-port /dev/ttyACM1
;   pio device monitor -p /dev/ttyACM1 -b 115200
; Compiles ONLY flrc_rx_main.cpp (the UART coprocessor main.cpp/radio.cpp
; are excluded). Serial commands: RUN, CONFIG, RESULTS, HELP.
[env:rp2040-flrc-rx]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<main.cpp> -<radio.cpp> -<pio_lr2021_rx.cpp> +<flrc_rx_main.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps = jgromes/RadioLib @ ^7.6.0
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC TX with RAW SPI (NO RadioLib) ───────────────────────────────
;   Identical init to rp2040-flrc-rx-raw for guaranteed parameter match
;   Transmits 2000 packets + DEADBEEF end marker
[env:rp2040-flrc-tx-raw]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_tx_raw.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200
;   Bypasses RadioLib beginFLRC() to avoid USB death + SPI errors
;   Output on both USB Serial and UART GP12/GP13
;   Commands: RUN  CONFIG  INIT  RESULTS  HELP
[env:rp2040-flrc-rx-raw]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_rx_raw.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200
