; ── FLRC PIO TX v2 (Hybrid: Arduino SPI init + PIO+DMA TX hot loop) ──
;   pio run -e rp2040-pio-tx-v2
;   Uses Arduino SPI for radio init (CDC-safe), then switches to PIO+DMA
;   for TX hot loop after CDC is established.
;   Fix for v1 CDC crash: PIO/DMA init deferred until after all CDC output.
[env:rp2040-pio-tx-v2]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_pio_tx_v2.cpp> +<pio_lr2021_rx.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC PIO TX v3 (Deferred printing: no Serial during TX loop) ──────
;   pio run -e rp2040-pio-tx-v3
;   Same as v2 but buffers all results, stops PIO, restores Arduino SPI,
;   then prints on CDC. Fix for v2 CDC-dies-during-TX-loop issue.
[env:rp2040-pio-tx-v3]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_pio_tx_v3.cpp> +<pio_lr2021_rx.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

