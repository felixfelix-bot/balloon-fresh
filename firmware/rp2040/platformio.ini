; PlatformIO project for RP2040 coprocessor firmware (Board B / ADR-015)
;
; Build:    pio run -e rp2040
; Flash:    pio run -e rp2040 -t upload
; Monitor:  pio device monitor -p /dev/ttyACM0 -b 115200
;
; Or via Makefile:
;   make rp2040-build
;   make rp2040-flash

[platformio]
default_envs = rp2040

[env:rp2040]
platform = raspberrypi
board = pico
framework = arduino
build_flags =
    -D RP2040
    -D SERIAL_BAUD=115200
    -D USE_PIO_RX=1
    -O2
    -Wall
lib_deps = jgromes/RadioLib @ ^7.6.0
upload_protocol = picotool
monitor_speed = 115200

; ── UART Echo Test (verify GP12/GP13 UART bridge) ───────────────────
;   pio run -e rp2040-uart-test
;   Copy UF2 to RPI-RP2
[env:rp2040-uart-test]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<main.cpp> -<radio.cpp> -<flrc_rx_main.cpp> -<pico_sdk_main.cpp> -<pio_lr2021_rx.cpp> +<uart_echo.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC Speed RX (RadioLib init + raw SPI hot loop) ────────────────
;   pio run -e rp2040-flrc-rx
;   pio run -e rp2040-flrc-rx -t upload --upload-port /dev/ttyACM1
;   pio device monitor -p /dev/ttyACM1 -b 115200
; Compiles ONLY flrc_rx_main.cpp (the UART coprocessor main.cpp/radio.cpp
; are excluded). Serial commands: RUN, CONFIG, RESULTS, HELP.
[env:rp2040-flrc-rx]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<main.cpp> -<radio.cpp> -<pio_lr2021_rx.cpp> +<flrc_rx_main.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps = jgromes/RadioLib @ ^7.6.0
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC TX (RadioLib init + raw SPI TX hot loop) ────────────────────
;   RadioLib beginFLRC() configures radio IDENTICALLY to rp2040-flrc-rx.
;   Raw SPI used only for per-packet TX hot path (write FIFO → SET_TX).
;   Transmits 2000 packets + DEADBEEF end marker.
[env:rp2040-flrc-tx-raw]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_tx_raw.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps = jgromes/RadioLib @ ^7.6.0
upload_protocol = picotool
monitor_speed = 115200
;   Bypasses RadioLib beginFLRC() to avoid USB death + SPI errors
;   Output on both USB Serial and UART GP12/GP13
;   Commands: RUN  CONFIG  INIT  RESULTS  HELP
[env:rp2040-flrc-rx-raw]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_rx_raw.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW TX (no RadioLib — raw SPI init matching RX) ─────────────
;   pio run -e rp2040-raw-tx
;   Sends 1000 packets + DEADBEEF end marker
;   Auto-starts 10s after boot (gives RX time to enter RX mode)
[env:rp2040-raw-tx]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_tx.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW TX 20MHz (SPI clock bump test — 20MHz vs 16MHz v4) ──────
;   pio run -e rp2040-raw-tx-20mhz
;   Only change from v4: SPI_FREQ_HZ 16000000UL → 20000000UL
;   LR2021 datasheet specifies 20MHz max SPI clock.
[env:rp2040-raw-tx-20mhz]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_tx_20mhz.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW RX 20MHz (must match TX SPI clock) ─────────────────────
;   pio run -e rp2040-raw-rx-20mhz
[env:rp2040-raw-rx-20mhz]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_rx_20mhz.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC DMA TX (DMA-based SPI FIFO writes — zero CPU wait) ──────────
;   pio run -e rp2040-dma-tx
;   Uses RP2040 DMA channel to feed spi0 TX FIFO autonomously.
;   DMA transfer chain: CLR_IRQ → WRITE_TX_FIFO(257B) → SET_TX.
;   Expected: ~2400 kbps (up from ~2200 with polling HW SPI)
[env:rp2040-dma-tx]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_dma_tx.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW TX BATCH (batch SPI transfer — spi_write_blocking) ──────
;   pio run -e rp2040-raw-tx-batch
;   Uses SPIClassRP2040::transfer(txbuf, nullptr, count) which calls
;   the Pico SDK spi_write_blocking() for true batch FIFO writes,
;   eliminating per-byte transfer() function call overhead.
;   Same radio config as rp2040-raw-tx (20MHz SPI, 1000 packets).
[env:rp2040-raw-tx-batch]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_tx_batch.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW TX PIPE (pipelined TX — overlap FIFO write with air time) ─
;   pio run -e rp2040-raw-tx-pipe
;   Based on v4 (flrc_raw_tx.cpp) with FIFO pipelining:
;   - PRIME: write pkt[0] + SET_TX before loop
;   - LOOP: poll IRQ → CLR_IRQ+CLR_TX_FIFO+CLEAR_ERRORS (one CS) → WRITE_FIFO(pkt[i+1]) → SET_TX
;   - Combines CLR_IRQ + CLR_TX_FIFO + CLEAR_ERRORS into single CS assertion
;   - Per-packet CLEAR_ERRORS (PA_OCP_OVP accumulates)
;   - Arduino SPI only (NO direct spi0_hw->dr), 16MHz, IRQ pin polling
;   Sends 1000 packets + DEADBEEF end marker
[env:rp2040-raw-tx-pipe]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_tx_pipe.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW TX SWEEP (runtime SPI frequency control) ────────────────
;   pio run -e rp2040-raw-tx-sweep
;   Accepts serial commands to set SPI frequency and run TX bursts:
;     SETSPI <freq_hz>  — set SPI clock, re-init peripheral
;     RUN               — 1000-packet TX burst at current SPI freq
;     INIT              — re-init radio
;     FREQ?             — query current requested/actual SPI freq
;   Default SPI freq: 15.625 MHz (125MHz/8)
[env:rp2040-raw-tx-sweep]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_tx_sweep.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RAW RX (no RadioLib — raw SPI init with all fixes) ──────────
;   pio run -e rp2040-raw-rx
;   Raw SPI init: SET_RX_PATH, CALIB_FE, CLEAR_ERRORS, correct freq
;   Auto-starts 8s after boot, listens for TX packets
[env:rp2040-raw-rx]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_raw_rx.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC PIO TX (PIO+DMA SPI — replaces Arduino per-byte SPI) ────────
;   pio run -e rp2040-pio-tx
;   Uses PIO state machine + DMA for SPI transfers (20.83MHz SCK).
;   Expected: reduce 535µs SPI overhead → ~103µs → ~1900 kbps.
;   Same radio config as rp2040-raw-tx (preamble=8, 2600kbps, 255B payload).
;   Prints spin count for first 5 packets — smoke test for fake results.
[env:rp2040-pio-tx]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_pio_tx.cpp> +<pio_lr2021_rx.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── SPI Timing Diagnostic (no radio needed — pure SPI timing) ────────
;   pio run -e rp2040-spi-timing-diag
;   Measures per-byte vs split-batch vs single-batch SPI timing.
;   Connect GP14 to scope/LA to see inter-batch SCK gaps.
[env:rp2040-spi-timing-diag]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_spi_timing_diag.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC PIO TX v2 (Hybrid: Arduino SPI init + PIO+DMA TX hot loop) ──
;   pio run -e rp2040-pio-tx-v2
;   Uses Arduino SPI for radio init (CDC-safe), then switches to PIO+DMA
;   for TX hot loop after CDC is established.
;   Fix for v1 CDC crash: PIO/DMA init deferred until after all CDC output.
[env:rp2040-pio-tx-v2]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_pio_tx_v2.cpp> +<pio_lr2021_rx.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC PIO TX v3 (Deferred printing: no Serial during TX loop) ──────
;   pio run -e rp2040-pio-tx-v3
;   Same as v2 but buffers all results, stops PIO, restores Arduino SPI,
;   then prints on CDC. Fix for v2 CDC-dies-during-TX-loop issue.
[env:rp2040-pio-tx-v3]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_pio_tx_v3.cpp> +<pio_lr2021_rx.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RANGE TX AUTO (autonomous — no serial needed, plug into powerbank) ─
;   pio run -e rp2040-range-tx-auto
;   Auto-starts 3s after power-up. Bursts 1000 pkts, 1s pause, repeat forever.
;   Embeds burst_id in pkt bytes 4-7 for RX correlation.
;   Output: BURST_START/BURST_DONE on Serial1 (UART) + Serial (USB, brief)
;   Flash to board 8332 (E663B035973B8332)
[env:rp2040-range-tx-auto]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_range_tx_auto.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RANGE RX AUTO (continuous RX with per-packet RSSI) ──────────
;   pio run -e rp2040-range-rx-auto
;   Auto-listens 2s after boot, continuous RX (no timeout).
;   Outputs PKT,n,seq,rssi for every packet.
;   Flash to board F242D (E663B035977F242D)
;   Use with: scripts/rx_range_logger.py
[env:rp2040-range-rx-auto]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_range_rx_auto.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RANGE TX+GPS (autonomous TX with optional GPS module) ──────
;   pio run -e rp2040-range-tx-gps
;   Auto-detects GPS on UART0 (GP0/GP1, 9600 baud NMEA).
;   If GPS present: embeds lat/lon/alt/sats in every packet.
;   If no GPS: fills zeros (fix=0). Fully backward compatible.
;   Flash to board 8332 (E663B035973B8332)
;   GPS wiring: GPS TX→GP1, GPS VCC→3V3, GPS GND→GND
[env:rp2040-range-tx-gps]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_range_tx_gps.cpp>
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC RANGE RX+GPS (RX with GPS extraction from packets) ──────────
;   pio run -e rp2040-range-rx-gps
;   Parses GPS fields from TX payload. Outputs per-packet RSSI + GPS.
;   Format: PKT,n,seq,rssi,lat,lon,alt,sats,hdop,fix
;   Flash to board F242D (E663B035977F242D)
;   Use with: scripts/rx_range_logger.py
[env:rp2040-range-rx-gps]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
