;   pio run -e rp2040-range-tx
;   pio run -e rp2040-range-tx -t upload --upload-port /dev/ttyACMX
;   Serial commands: POWER <dbm>  PKTLEN <n>  FREQ <mhz>  COUNT <n>
;                    RUN  STATUS  INIT  HELP
;   Based on flrc_raw_tx.cpp v4 with runtime params. No auto-start.
