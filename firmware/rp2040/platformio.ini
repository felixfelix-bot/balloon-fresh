; ── RANGE TEST TX/RX PER-BITRATE (override compile-time bitrate) ─────
;   Build + flash matching pair for each bitrate in the sweep.
;   pio run -e rp2040-range-tx-650 && pio run -e rp2040-range-rx-650
[env:rp2040-range-tx-1300]
extends = env:rp2040-range-tx-auto
build_flags = ${env:rp2040-range-tx-auto.build_flags} -D TX_BITRATE_KBPS=1300

[env:rp2040-range-rx-1300]
extends = env:rp2040-range-rx-auto
build_flags = ${env:rp2040-range-rx-auto.build_flags} -D RX_BITRATE_KBPS=1300

[env:rp2040-range-tx-650]
