build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC TIMING PROFILER (measure per-operation SPI timing) ──────────
;   pio run -e rp2040-timing-profiler
;   Measures exact µs for each SPI operation: CLR_IRQ, WRITE_FIFO, SET_TX, TX_DONE_WAIT
;   Also measures per-byte SPI transfer() time (with and without CS overhead)
;   GP14 = timing probe for scope/LA trigger
[env:rp2040-timing-profiler]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
build_src_filter = -<*> +<flrc_timing_profiler.cpp>
build_flags = -D SERIAL_BAUD=115200 -O2 -Wall
lib_deps =
upload_protocol = picotool
monitor_speed = 115200

; ── FLRC THROUGHPUT TX (max throughput — 127B continuous streaming) ───
;   pio run -e rp2040-throughput-tx
;   127-byte packets, back-to-back, no burst gaps. No GPS. Pure throughput.
;   Auto-starts 3s after power-up. Stats every 1000 packets.
[env:rp2040-throughput-tx]
