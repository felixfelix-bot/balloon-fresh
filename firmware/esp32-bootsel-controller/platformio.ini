; PlatformIO project: ESP32-C3 BOOTSEL Controller for RP2040
;
; Environments:
;   esp32c3      — Auto-BOOTSEL trigger firmware (default)
;   esp32c3-diag — GPIO diagnostic (toggle pins for multimeter testing)
;
; Wiring (DIRECT WIRE, NO RESISTORS):
;   GPIO1 (D1) → RP2040 RESET button pad (3V3 signal side)
;   GPIO8 (D8) → RP2040 BOOTSEL button pad (3V3 signal side)
;   GND        → GND
;
; Build & flash:
;   pio run -e esp32c3 -t upload --upload-port /dev/ttyACMx
;   pio run -e esp32c3-diag -t upload --upload-port /dev/ttyACMx

[platformio]
default_envs = esp32c3

; Default: auto-BOOTSEL firmware
[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 460800
monitor_speed = 115200
build_src_filter = +<main.cpp> -<bootsel_diag.cpp>
build_flags =
    -O2
    -Wall

; Diagnostic: toggle GPIO pins for multimeter testing
[env:esp32c3-diag]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 460800
build_src_filter = -<main.cpp> +<bootsel_diag.cpp>
build_flags =
    -O2
    -Wall
