; ESP32-C3 SuperMini UART → USB CDC Bridge
; Board: ESP32-C3 SuperMini (303a:1001 = USB JTAG/serial debug unit)
; Uses esp32-c3-devkitm-1 (proven working variant, same chip)
;
; IMPORTANT: ARDUINO_USB_CDC_ON_BOOT=1 makes Serial = USB CDC
;            Serial1 = UART1 (remappable to any pins)
;
; Build:  pio run -e esp32-uart-bridge
; Flash:  make esp32-flash-bridge PORT=/dev/ttyACMX

[platformio]
default_envs = esp32-uart-bridge

[env:esp32-uart-bridge]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
build_flags =
    -D SERIAL_BAUD=115200
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -O2
    -Wall
monitor_speed = 115200
upload_speed = 921600
