; ESP32-C3 UART → USB CDC Bridge
; Reads UART1 from RP2040, forwards to native USB CDC
;
; Wiring: RP2040 GP12(TX) → ESP32 GPIO1(RX)
;         RP2040 GP13(RX) ← ESP32 GPIO0(TX)
;         GND → GND
;
; Build:  pio run -e esp32-uart-bridge
; Flash:  pio run -e esp32-uart-bridge -t upload --upload-port /dev/ttyACMX
;         or: python3 -m esptool --port /dev/ttyACMX --chip esp32c3 write_flash 0x0 .pio/build/esp32-uart-bridge/firmware.bin

[platformio]
default_envs = esp32-uart-bridge

[env:esp32-uart-bridge]
platform = espressif32
board = lolin_c3_mini
framework = arduino
board_build.mcu = esp32c3
build_flags =
    -D SERIAL_BAUD=115200
    -O2
    -Wall
monitor_speed = 115200
upload_speed = 921600
